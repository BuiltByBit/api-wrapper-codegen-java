paths:
  /oauth2/token:
    post:
      description: "Supported grant types: `authorization_code`, and `refresh_token`.\r\
        \nMust authenticate via HTTP Basic Authentication, using your OAuth2 client\
        \ credentials."
      operationId: get-oauth2-token
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/get_oauth2_token_request'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_oauth2_token_200_response'
          description: OK
      security:
      - token: []
      summary: Request an access token using an existing grant
      tags:
      - oauth2
      x-stoplight:
        id: e2kos61m784xx
      x-content-type: application/x-www-form-urlencoded
      x-accepts: application/json
  /oauth2/token/revoke:
    post:
      description: "Must authenticate via HTTP Basic Authentication, using your OAuth2\
        \ client credentials."
      operationId: get-oauth2-token-revoke
      parameters:
      - description: OAuth2 client credentials in the Basic authorization format.
        explode: false
        in: header
        name: Authorization
        required: true
