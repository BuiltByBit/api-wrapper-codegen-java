openapi: 3.0.0
info:
  contact:
    name: BuiltByBit
    url: https://builtbybit.com/ticket
  description: "All operations not tagged 'free' require an active [Ultimate](https://builtbybit.com/account/ultimate)\
    \ subscription or invite-only permissions.\r\n\r\nV2 documentation: https://builtbybit.com/wiki/api-v2/\
    \ \\\r\nOAuth2 documentation: https://builtbybit.com/wiki/oauth2/"
  termsOfService: https://builtbybit.com/wiki/terms
  title: BuiltByBit API
  version: v2
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
- description: BuiltByBit
  url: https://api.builtbybit.com/
tags:
- name: free
- name: global
- name: oauth2
- name: resources/buyer
- name: resources/creator
- name: resources/discovery
paths:
  /oauth2/token:
    post:
      description: "Supported grant types: `authorization_code`, and `refresh_token`.\r\
        \nMust authenticate via HTTP Basic Authentication, using your OAuth2 client\
        \ credentials."
      operationId: get-oauth2-token
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/get_oauth2_token_request'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_oauth2_token_200_response'
          description: OK
      security:
      - token: []
      summary: Request an access token using an existing grant
      tags:
      - oauth2
      x-stoplight:
        id: e2kos61m784xx
      x-content-type: application/x-www-form-urlencoded
      x-accepts: application/json
  /oauth2/token/revoke:
    post:
      description: "Must authenticate via HTTP Basic Authentication, using your OAuth2\
        \ client credentials."
      operationId: get-oauth2-token-revoke
      parameters:
      - description: OAuth2 client credentials in the Basic authorization format.
        explode: false
        in: header
        name: Authorization
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/get_oauth2_token_revoke_request'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_oauth2_token_revoke_200_response'
          description: OK
      security:
      - token: []
      summary: Revoke an existing access or refresh token
      tags:
      - oauth2
      x-stoplight:
        id: amvjs8enfwm15
      x-content-type: application/x-www-form-urlencoded
      x-accepts: application/json
  /v2/resources/discover/resources:
    get:
      description: "Supported 'with' hints:\r\n- `filters`: include dynamic filter\
        \ information in the response.\r\n- See 'Resource' model for additional 'with'\
        \ hints."
      operationId: get-resources-discover-resources
      parameters:
      - allowEmptyValue: false
        description: "A category ID to filter on. If the provided category is a parent,\
          \ resources from subcategories will also be included."
        explode: true
        in: query
        name: category_id
        required: false
        schema:
          type: string
        style: form
      - description: A comma-separated list of additional data to include. See endpoint
          documentation for more information.
        explode: true
        in: query
        name: with
        required: false
        schema:
          example: "Description,Creator"
          type: string
        style: form
      - description: A list of dynamic filters to apply.
        explode: false
        in: query
        name: filters
        required: false
        schema:
          type: object
        style: deepObject
      - description: A comma-separated list of resource IDs to filter on.
        explode: true
        in: query
        name: resource_ids
        required: false
        schema:
          type: string
        style: form
      - description: The page number to return.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: The number of resources to return per page.
        explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          type: number
        style: form
      - explode: true
        in: query
        name: no_dependencies
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_resources_200_response'
          description: OK
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_resources_4XX_response'
          description: ""
        "5XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_resources_4XX_response'
          description: ""
      security:
      - token: []
      summary: Fetch a list of resources
      tags:
      - resources/discovery
      x-stoplight:
        id: p24j0imx0z6cc
      x-accepts: application/json
  /v2/resources/discover/categories:
    get:
      description: "Supported 'with' hints:\r\n- Children: includes all subcategories\
        \ and their children"
      operationId: get-resources-discover-categories
      parameters:
      - description: A category ID to filter on.
        explode: true
        in: query
        name: category_id
        required: false
        schema:
          type: string
        style: form
      - description: A comma-separated list of submodels to include.
        explode: true
        in: query
        name: with
        required: false
        schema:
          enum:
          - SortOptions
          - FilterOptions
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_categories_200_response'
          description: OK
        "4XX":
          content:
