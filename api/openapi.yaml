  /v2/resources/discover/resources:
    get:
      description: "Supported 'with' hints:\r\n- `filters`: include dynamic filter\
        \ information in the response.\r\n- See 'Resource' model for additional 'with'\
        \ hints."
      operationId: get-resources-discover-resources
      parameters:
      - allowEmptyValue: false
        description: "A category ID to filter on. If the provided category is a parent,\
          \ resources from subcategories will also be included."
        explode: true
        in: query
        name: category_id
        required: false
        schema:
          type: string
        style: form
      - description: A comma-separated list of additional data to include. See endpoint
          documentation for more information.
        explode: true
        in: query
        name: with
        required: false
        schema:
          example: "Description,Creator"
          type: string
        style: form
      - description: A list of dynamic filters to apply.
        explode: false
        in: query
        name: filters
        required: false
        schema:
          type: object
        style: deepObject
      - description: A comma-separated list of resource IDs to filter on.
        explode: true
        in: query
        name: resource_ids
        required: false
        schema:
          type: string
        style: form
      - description: The page number to return.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - description: The number of resources to return per page.
        explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          type: number
        style: form
      - explode: true
        in: query
        name: no_dependencies
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_resources_200_response'
          description: OK
        "4XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_resources_4XX_response'
          description: ""
        "5XX":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_resources_discover_resources_4XX_response'
          description: ""
      security:
      - token: []
      summary: Fetch a list of resources
      tags:
      - resources/discovery
      x-stoplight:
        id: p24j0imx0z6cc
      x-accepts: application/json
