      - description: The number of items per page to return.
        explode: true
        in: query
        name: per_page
        required: false
        schema:
          default: 25
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: A comma-separated list of supported 'with hints'. See model &
          endpoint-level docs for more info.
        explode: true
        in: query
        name: with
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
