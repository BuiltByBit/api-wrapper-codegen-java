    url: https://builtbybit.com/ticket
  description: "All operations not tagged 'free' require an active [Ultimate](https://builtbybit.com/account/ultimate)\
    \ subscription or invite-only permissions.\r\n\r\nV2 documentation: https://builtbybit.com/wiki/api-v2/\
    \ \\\r\nOAuth2 documentation: https://builtbybit.com/wiki/oauth2/"
  termsOfService: https://builtbybit.com/wiki/terms
  title: BuiltByBit API
  version: v2
externalDocs:
